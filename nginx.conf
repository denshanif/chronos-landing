events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  server_tokens off;
  sendfile on;
  tcp_nopush on;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json application/javascript image/svg+xml image/webp image/avif;

  server {
    listen 80;
    server_name chronos.katalisdev.my.id;

    root /usr/share/nginx/html;
    index index.html;

    # For Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Static assets with long cache
    location ~* \.(jpg|jpeg|png|webp|avif|svg|ico|css|js|woff2?)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # SPA routing — serve index.html for all non-file paths
    location / {
      try_files $uri $uri.html $uri/ /index.html;
    }
  }
}
